apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "daari.fullname" . }}
  labels:
    app.kubernetes.io/name: daari
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: daari
  template:
    metadata:
      labels:
        app.kubernetes.io/name: daari
    spec:
      containers:
        - name: daari
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- if .Values.redis.enabled }}
            - name: DAARI_CACHE__BACKEND
              value: redis
            - name: DAARI_CACHE__REDIS_URL
              value: {{ .Values.redis.url | quote }}
            {{- end }}
            {{- if .Values.postgres.enabled }}
            - name: DAARI_OBSERVABILITY__BACKEND
              value: postgres
            - name: DAARI_OBSERVABILITY__POSTGRES_URL
              value: {{ .Values.postgres.url | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.livenessPath }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readinessPath }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
