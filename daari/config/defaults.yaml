server:
  host: 127.0.0.1
  port: 11435

models:
  l3: llama3.2:3b
  l4: llama3.1:8b
  l5: llama3.1:70b
  weights:
    llama3.2:3b:
      latency: 0.9
      accuracy: 0.6
    llama3.1:8b:
      latency: 0.5
      accuracy: 0.8
    llama3.1:70b:
      latency: 0.2
      accuracy: 0.95

ollama:
  base_url: http://127.0.0.1:11434

cache:
  l0:
    enabled: true
    path: ~/.daari/cache/l0
  l1:
    enabled: true
    path: ~/.daari/cache/l1
    similarity_threshold: 0.88
    max_entries: 1000
    embedding_model: nomic-embed-text

routing:
  prefer: balanced
  confidence_threshold: 0.7
  # Cap the local tier for chat/Ask requests (L3|L4|L5). Unset keeps current
  # behavior (long prompts may route to L4/L5). Per-request X-Daari-Tier-Cap
  # header wins over this value. Cursor users who prefer latency can set L3.
  max_tier_for_chat:

frontier:
  enabled: false
  provider: openai
  model: gpt-4o-mini
  confidence_threshold: 0.7
  base_url: https://api.openai.com/v1

tools:
  unknown: deny
  allow:
    - git status
    - git diff
    - pytest
    - eslint *
  block:
    - rm *
    - curl *| sh
    - "*> /dev/*"
  timeout_seconds: 30

context:
  enabled: true
  path: ~/.daari/context/commands

integrations:
  sourcegraph:
    url: https://sourcegraph.com
    triggers:
      - "@sourcegraph"
  ghe:
    url: https://api.github.com
    triggers:
      - "@ghe"
  gitlab:
    url: https://gitlab.com/api/v4
    triggers:
      - "@gitlab"

enterprise:
  enabled: false
  id:
  org_id:
  shared_cache_url:
  shared_cache_token:
  shared_cache_require_token: false
  shared_cache_timeout_seconds: 1.0
  shared_cache_max_retries: 2
  shared_cache_backoff_seconds: 0.2
  shared_cache_path:
  learning_enabled: false
  learning_url:
  learning_token:
  learning_timeout_seconds: 0.5
  learning_sync_seconds: 300
  learning_path:
  policy_overrides: {}
  cache:
    enabled: false
    share_classes: []
    no_org_cache_default: false
  learning:
    enabled: false
    upload_prompts: false
    upload_code: false
