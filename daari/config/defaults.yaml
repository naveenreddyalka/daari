server:
  host: 127.0.0.1
  port: 11435

models:
  l3: llama3.2:3b

ollama:
  base_url: http://127.0.0.1:11434

cache:
  l0:
    enabled: true
    path: ~/.daari/cache/l0
  l1:
    enabled: true
    path: ~/.daari/cache/l1
    similarity_threshold: 0.92
    max_entries: 1000
    embedding_model: nomic-embed-text

frontier:
  enabled: false
  provider: openai
  model: gpt-4o-mini
  confidence_threshold: 0.7
  base_url: https://api.openai.com/v1
