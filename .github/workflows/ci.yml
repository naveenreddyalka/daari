name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit and integration tests (mocked)
        run: pytest -m "not integration and not benchmark" -q

  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install extension test deps
        working-directory: packages/browser-extension
        run: npm ci --no-audit --no-fund

      - name: Run extension DOM tests
        working-directory: packages/browser-extension
        run: npm test
