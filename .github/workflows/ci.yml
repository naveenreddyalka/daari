name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit and integration tests (mocked)
        run: pytest -m "not integration and not benchmark" -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

  sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package (runtime deps only)
        run: pip install -e .

      - name: Package imports cleanly
        run: python -c "import daari; import daari.router.router; import daari.gateway.openai"

      - name: Default settings load
        run: python -c "from daari.config.settings import Settings; s = Settings.load(); print(f'settings ok, port={s.server.port}')"

      - name: CLI entrypoint responds
        run: daari --help

      - name: Gateway app builds
        run: python -c "from daari.server.app import create_app; from daari.config.settings import Settings; create_app(Settings.load()); print('app ok')"

  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install extension test deps
        working-directory: packages/browser-extension
        run: npm ci --no-audit --no-fund

      - name: Run extension DOM tests
        working-directory: packages/browser-extension
        run: npm test

      - name: Install web-ui test deps
        working-directory: packages/web-ui
        run: npm ci --no-audit --no-fund

      - name: Run web-ui dashboard DOM tests
        working-directory: packages/web-ui
        run: npm test
