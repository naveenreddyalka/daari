name: autodev-cycle

# Fallback/alternative to the Cursor Automation in docs/automations/dev-cycle.md.
# No-ops until the CURSOR_API_KEY repo secret is set.
# Disable by removing the schedule block or deleting the CURSOR_API_KEY secret.

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: autodev-cycle
  cancel-in-progress: false

jobs:
  dev-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check for API key
        id: gate
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          if [ -z "$CURSOR_API_KEY" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "CURSOR_API_KEY secret not set — skipping autodev cycle."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.enabled == 'true'
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.enabled == 'true'
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        if: steps.gate.outputs.enabled == 'true'
        run: pip install -e ".[dev]"

      - name: Install Cursor CLI
        if: steps.gate.outputs.enabled == 'true'
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"

      - name: Run dev cycle
        if: steps.gate.outputs.enabled == 'true'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "daari-autodev"
          git config user.email "autodev@users.noreply.github.com"
          cursor-agent --print --force \
            "You are working in the current checkout of naveenreddyalka/daari. Read AGENTS.md and follow it exactly. Pick the highest-priority open GitHub issue labeled auto-dev without the agent:working label and no open linked PR (gh issue list --label auto-dev --state open). If none, print 'backlog empty' and stop. Add agent:working to it, create branch autodev/<issue-number>-<slug>, implement the issue TDD-style honoring its acceptance criteria, run pytest -m 'not integration and not benchmark' -q until green, update docs/TRACKING.md when relevant, commit with a conventional message, push the branch, open a PR whose body contains 'Closes #<issue>', run gh pr merge --auto --squash, then remove the agent:working label. If blocked, comment findings on the issue and remove agent:working. Hard limits: no tags, no releases, no force-push, no new runtime dependencies, no edits under .github/workflows/."
