name: Publish Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      repository:
        description: "Publish target (pypi or testpypi)"
        required: true
        default: "pypi"
        type: choice
        options:
          - pypi
          - testpypi

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distribution artifacts
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check --strict dist/*

      - name: Smoke-test wheel install
        run: |
          python -m venv /tmp/wheel-test
          /tmp/wheel-test/bin/pip install dist/*.whl
          /tmp/wheel-test/bin/daari --help

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
    environment: pypi
    if: ${{ github.event_name == 'release' || github.event.inputs.repository == 'pypi' }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-testpypi:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
    environment: testpypi
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.repository == 'testpypi' }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
